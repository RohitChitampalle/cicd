name: CICD - Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
     
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1

      - name: Install Dependencies
        run: echo "npm install"

      - name: Build the application
        run: echo "npm run build"

      - name: Deployment 
        run: echo "Deployment Successfully done" 
